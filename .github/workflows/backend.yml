name: Backend (kenios.py)

on:
  push:
    branches: [ "**" ]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Syntax check (compileall)
        run: python -m compileall -q backend/kenios.py

      - name: Import smoke test
        working-directory: backend
        run: |
          python -c "import kenios; print('OK — kenios import thành công, số route:', len(kenios.app.routes))"

      - name: Liệt kê endpoint
        working-directory: backend
        run: |
          python - <<'PY'
          import kenios
          for r in sorted(kenios.app.routes, key=lambda x: getattr(x, "path", "")):
              methods = ",".join(sorted(getattr(r, "methods", []) or []))
              print(f"{methods:20} {getattr(r, 'path', '')}")
          PY
